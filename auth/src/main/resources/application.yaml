spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authdb}
    username: ${DB_USERNAME:lalit}
    password: ${DB_PASSWORD:password}

  jpa:
    database: PostgreSQL
    show-sql: true

    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: bTZhKzZ2O3syIWNhfTBtLXZkdF5saHM1bDlgdmpkPzRzamw=


server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone:
        ${EUREKA_URL:http://localhost:8761/eureka}


